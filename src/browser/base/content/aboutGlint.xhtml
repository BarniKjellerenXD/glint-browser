<?xml version="1.0" encoding="UTF-8"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<?xml-stylesheet href="chrome://browser/skin/aboutGlint.css" type="text/css"?>

<!DOCTYPE html [
  <!ENTITY % htmlDTD SYSTEM "chrome://global/locale/html.dtd">
  %htmlDTD;
]>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:xul="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      dir="&locale.dir;"
      lang="&locale.code;"
      role="document"
      class="about-glint"
      style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);">

<head>
  <title>&newTabPage.title;</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="chrome://branding/content/icon64.svg"/>
  <script src="chrome://browser/content/aboutGlint.js"/>
  <style>
    /* Base reset — applied before the external stylesheet loads */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #e2e8f0;
      background: transparent;
    }
  </style>
</head>

<body>

  <div id="glintContainer">

    <!-- Greeting -->
    <div id="glintGreeting">
      <span id="glintTimeGreeting" class="greeting-text">Good morning</span>
    </div>

    <!-- Search bar -->
    <div id="glintSearchWrapper">
      <span class="search-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input id="glintSearchInput"
             type="text"
             autocomplete="off"
             spellcheck="false"
             placeholder="Search or enter an address…"
             aria-label="Search or enter address"/>
    </div>

    <!-- Quick Dial Tiles -->
    <div id="glintDialSection">
      <h2 class="dial-section-title">Top Sites</h2>
      <div id="glintDialGrid" class="dial-grid">
        <!-- Populated dynamically by aboutGlint.js -->
        <div class="dial-tile dial-tile-placeholder">
          <div class="dial-tile-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </div>
          <span class="dial-tile-label">Add Site</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Background decoration -->
  <div class="glint-bg-orb glint-bg-orb-1"></div>
  <div class="glint-bg-orb glint-bg-orb-2"></div>
  <div class="glint-bg-orb glint-bg-orb-3"></div>

</body>
</html>
