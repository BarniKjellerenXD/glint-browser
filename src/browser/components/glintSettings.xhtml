<?xml version="1.0"?>
<?xml-stylesheet href="chrome://global/skin/" type="text/css"?>
<!DOCTYPE overlay [
  <!ENTITY % glintDTD SYSTEM "chrome://browser/locale/glint/glint.dtd">
  %glintDTD;
]>
<overlay xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
         xmlns:html="http://www.w3.org/1999/xhtml">

  <prefpane id="paneGlint"
            label="&glint.settings.title;">
    <script src="chrome://browser/content/glintSettings.js"/>

    <!-- ===== Appearance ===== -->
    <groupbox id="glintAppearanceGroup">
      <caption label="&glint.appearance.label;"/>

      <hbox align="center">
        <label value="&glint.theme.label;" control="glintThemeSelect"/>
        <menulist id="glintThemeSelect"
                  oncommand="GlintSettings.applyTheme({
                    blur: Services.prefs.getIntPref('glint.theme.glass.blur', 18),
                    opacity: Services.prefs.getIntPref('glint.theme.glass.opacity', 70),
                    accent: this.selectedItem.value,
                    wallpaper: Services.prefs.getStringPref('glint.theme.wallpaper', 'aurora'),
                  });">
          <menupopup>
            <menuitem label="&glint.theme.liquidGlass;" value="liquid-glass"/>
            <menuitem label="&glint.theme.dark;" value="dark"/>
            <menuitem label="&glint.theme.light;" value="light"/>
          </menupopup>
        </menulist>
      </hbox>

      <hbox align="center">
        <label value="&glint.blur.label;" control="glintBlurSlider"/>
        <scale id="glintBlurSlider"
               min="0" max="36" step="1"
               oninput="GlintSettings.applyTheme({
                 blur: this.value,
                 opacity: Services.prefs.getIntPref('glint.theme.glass.opacity', 70),
                 accent: Services.prefs.getStringPref('glint.theme.accent', 'purple-blue'),
                 wallpaper: Services.prefs.getStringPref('glint.theme.wallpaper', 'aurora'),
               });"/>
      </hbox>

      <hbox align="center">
        <label value="&glint.opacity.label;" control="glintOpacitySlider"/>
        <scale id="glintOpacitySlider"
               min="30" max="100" step="5"
               oninput="GlintSettings.applyTheme({
                 blur: Services.prefs.getIntPref('glint.theme.glass.blur', 18),
                 opacity: this.value,
                 accent: Services.prefs.getStringPref('glint.theme.accent', 'purple-blue'),
                 wallpaper: Services.prefs.getStringPref('glint.theme.wallpaper', 'aurora'),
               });"/>
      </hbox>

      <hbox align="center">
        <label value="&glint.accent.label;"/>
        <vbox>
          <hbox id="glintAccentSwatches">
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);"
                           oncommand="GlintSettings._applyAccent('purple-blue')"
                           tooltiptext="&glint.accent.purpleBlue;"/>
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #43e97b, #38f9d7);"
                           oncommand="GlintSettings._applyAccent('green')"
                           tooltiptext="&glint.accent.green;"/>
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #fa709a, #fee140);"
                           oncommand="GlintSettings._applyAccent('pink')"
                           tooltiptext="&glint.accent.pink;"/>
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #4facfe, #00f2fe);"
                           oncommand="GlintSettings._applyAccent('blue')"
                           tooltiptext="&glint.accent.blue;"/>
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #f6d365, #fda085);"
                           oncommand="GlintSettings._applyAccent('orange')"
                           tooltiptext="&glint.accent.orange;"/>
            <toolbarbutton class="accent-swatch" style="background: linear-gradient(135deg, #0fdce8, #71dfb0);"
                           oncommand="GlintSettings._applyAccent('teal')"
                           tooltiptext="&glint.accent.teal;"/>
          </hbox>
        </vbox>
      </hbox>

      <hbox align="center">
        <label value="&glint.wallpaper.label;"/>
        <radiogroup id="glintWallpaperRadios"
                     oncommand="GlintSettings._applyWallpaper(this.selectedItem.value)">
          <radio label="&glint.wallpaper.aurora;" value="aurora"/>
          <radio label="&glint.wallpaper.sunset;" value="sunset"/>
          <radio label="&glint.wallpaper.ocean;" value="ocean"/>
          <radio label="&glint.wallpaper.forest;" value="forest"/>
          <radio label="&glint.wallpaper.midnight;" value="midnight"/>
        </radiogroup>
      </hbox>
    </groupbox>

    <!-- ===== Quick Commands ===== -->
    <groupbox id="glintQuickCommandsGroup">
      <caption label="&glint.quickCommands.label;"/>

      <hbox align="center">
        <checkbox id="glintQcEnabled"
                  label="&glint.qc.enable;"
                  oncommand="Services.prefs.setBoolPref('glint.quickCommands.enabled', this.checked);"/>
      </hbox>

      <separator/>

      <label value="&glint.qc.sources.label;"/>
      <vbox id="glintQcSources">
        <checkbox label="&glint.qc.tabs;" checked="true"/>
        <checkbox label="&glint.qc.bookmarks;" checked="true"/>
        <checkbox label="&glint.qc.history;" checked="true"/>
        <checkbox label="&glint.qc.commands;" checked="true"/>
        <checkbox label="&glint.qc.settings;" checked="true"/>
        <checkbox label="&glint.qc.web;" checked="true"/>
      </vbox>
    </groupbox>

    <!-- ===== Privacy ===== -->
    <groupbox id="glintPrivacyGroup">
      <caption label="&glint.privacy.label;"/>

      <hbox align="center">
        <checkbox id="glintFarblingEnabled"
                  label="&glint.farbling.enable;"
                  oncommand="Services.prefs.setBoolPref('privacy.farbling.enabled', this.checked);"/>
      </hbox>

      <separator/>

      <label value="&glint.farbling.toggles.label;"/>
      <vbox id="glintFarblingToggles">
        <checkbox label="&glint.farbling.canvas;"
                  oncommand="Services.prefs.setBoolPref('privacy.farbling.canvas.noise', this.checked);"/>
        <checkbox label="&glint.farbling.audio;"
                  oncommand="Services.prefs.setBoolPref('privacy.farbling.audio.noise', this.checked);"/>
        <checkbox label="&glint.farbling.plugins;"
                  oncommand="Services.prefs.setBoolPref('privacy.farbling.plugins.enabled', this.checked);"/>
        <checkbox label="&glint.farbling.fonts;"
                  oncommand="Services.prefs.setBoolPref('privacy.farbling.fonts.enabled', this.checked);"/>
      </vbox>
    </groupbox>

    <!-- ===== Layout ===== -->
    <groupbox id="glintLayoutGroup">
      <caption label="&glint.layout.label;"/>

      <hbox align="center">
        <label value="&glint.layout.profile.label;" control="glintLayoutRadios"/>
        <radiogroup id="glintLayoutRadios"
                     oncommand="GlintSettings.applyLayoutProfile(this.selectedItem.value)">
          <radio label="&glint.layout.classic;" value="classic"/>
          <radio label="&glint.layout.zen;" value="zen"/>
          <radio label="&glint.layout.floating;" value="floating"/>
          <radio label="&glint.layout.minimal;" value="minimal"/>
        </radiogroup>
      </hbox>

      <hbox align="center">
        <checkbox id="glintCompactMode"
                  label="&glint.layout.compact;"
                  oncommand="GlintSettings.toggleCompactMode();"/>
      </hbox>
    </groupbox>

    <style>
      /* Glassmorphism styling using design tokens */
      #paneGlint {
        background: var(--wallpaper-gradient, linear-gradient(135deg, #0f0c29, #302b63, #24243e));
        color: #e0e0e0;
        padding: 1.5rem;
      }

      groupbox {
        background: rgba(10, 10, 20, var(--glass-opacity, 0.7));
        backdrop-filter: blur(var(--glass-blur-medium, 18px));
        -moz-backdrop-filter: blur(var(--glass-blur-medium, 18px));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      caption {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--accent-gradient, #667eea);
        margin-bottom: 0.75rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .accent-swatch {
        min-width: 32px;
        min-height: 32px;
        border-radius: 50%;
        border: 2px solid transparent;
        margin: 0 4px;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s;
      }

      .accent-swatch:hover {
        transform: scale(1.15);
        border-color: rgba(255,255,255,0.5);
      }

      scale {
        width: 200px;
      }

      checkbox, radio {
        margin: 4px 0;
      }

      label {
        color: #c0c0d0;
        min-width: 100px;
      }

      separator {
        border-top: 1px solid rgba(255,255,255,0.06);
        margin: 8px 0;
      }

      menulist {
        margin-inline-start: 8px;
      }
    </style>
  </prefpane>
</overlay>
